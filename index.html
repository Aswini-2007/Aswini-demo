<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School Timetable</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>School Timetable and Schedule Management System 2026</h1>
        <p>Manage your weekly subjects and lecture timings</p>
    </header>

    <div class="controls">
        <input type="text" id="subjectInput" placeholder="Subject (e.g., Math, Science)">
        <select id="dayInput">
            <option value="1">Monday</option>
            <option value="2">Tuesday</option>
            <option value="3">Wednesday</option>
            <option value="4">Thursday</option>
            <option value="5">Friday</option>
        </select>
        <input type="time" id="timeInput">
        <button onclick="handleAdd()">Add Subject</button>
        <button class="btn-clear" onclick="clearAll()">Reset All</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="time-col">Time</th>
                    <th>Monday</th>
                    <th>Tuesday</th>
                    <th>Wednesday</th>
                    <th>Thursday</th>
                    <th>Friday</th>
                </tr>
            </thead>
            <tbody id="timetableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="sd.js"></script>

</body>
</html>
