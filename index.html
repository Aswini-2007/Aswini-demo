<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Timetable and Schedule Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 1100px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #1e293b;
            font-size: 32px;
            margin-bottom: 15px;
        }

        p.subtitle {
            text-align: center;
            color: #475569;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .controls {
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .controls input, .controls select, .controls button {
            padding: 12px 16px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .controls input:focus, .controls select:focus {
            border-color: #6366f1;
        }

        #subject {
            flex: 1;
            min-width: 200px;
        }

        #day, #time {
            min-width: 150px;
        }

        .btn-add {
            background-color: #5c51d5;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            min-width: 140px;
        }

        .btn-add:hover {
            background-color: #4f46bb;
        }

        .btn-reset {
            background-color: #d9534f;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            min-width: 140px;
        }

        .btn-reset:hover {
            background-color: #c9302c;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid #e2e8f0;
            padding: 15px;
            text-align: center;
            height: 70px;
            vertical-align: middle;
        }

        th {
            background-color: #f8fafc;
            color: #1e293b;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        td.time-col {
            font-weight: 600;
            color: #64748b;
            width: 100px;
        }

        .event-card {
            display: inline-block;
            width: 90%;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Color Themes for Subjects */
        .theme-blue {
            background-color: #e6edff;
            color: #3056d3;
            border-left: 4px solid #3056d3;
        }
        .theme-green {
            background-color: #e6fcf5;
            color: #087f5b;
            border-left: 4px solid #087f5b;
        }
        .theme-yellow {
            background-color: #fef0c7;
            color: #946c00;
            border-left: 4px solid #946c00;
        }
        .theme-red {
            background-color: #fce4e4;
            color: #c92a2a;
            border-left: 4px solid #c92a2a;
        }
        .theme-mint {
            background-color: #e6ffed;
            color: #1e824c;
            border-left: 4px solid #1e824c;
        }
        .theme-purple {
            background-color: #f3e8ff;
            color: #7e22ce;
            border-left: 4px solid #7e22ce;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>School Timetable and Schedule Management System 2026</h1>
    <p class="subtitle">Manage your weekly subjects and lecture timings</p>

    <div class="controls">
        <input type="text" id="subject" placeholder="Subject (e.g., Math, Scier">
        <select id="day">
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
        </select>
        <input type="time" id="time">
        <button class="btn-add" id="addBtn">Add Subject</button>
        <button class="btn-reset" id="resetBtn">Reset All</button>
    </div>

    <div class="table-wrapper">
        <table id="timetable">
            <thead>
                <tr>
                    <th>TIME</th>
                    <th>MONDAY</th>
                    <th>TUESDAY</th>
                    <th>WEDNESDAY</th>
                    <th>THURSDAY</th>
                    <th>FRIDAY</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Initial data matching the provided screenshot
    let scheduleData = [
        { subject: 'Mathematics', day: 'Monday', time: '09:00', theme: 'theme-blue' },
        { subject: 'Physics', day: 'Tuesday', time: '09:00', theme: 'theme-mint' },
        { subject: 'English', day: 'Wednesday', time: '10:30', theme: 'theme-yellow' },
        { subject: 'History', day: 'Monday', time: '11:00', theme: 'theme-red' },
        { subject: 'Computer Science', day: 'Friday', time: '14:00', theme: 'theme-green' }
    ];

    const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    const themes = ['theme-blue', 'theme-green', 'theme-yellow', 'theme-red', 'theme-mint', 'theme-purple'];

    const tableBody = document.getElementById('tableBody');
    const subjectInput = document.getElementById('subject');
    const dayInput = document.getElementById('day');
    const timeInput = document.getElementById('time');
    const addBtn = document.getElementById('addBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Function to render the timetable grid
    function renderTable() {
        tableBody.innerHTML = '';

        // Extract unique times and sort them
        let times = [...new Set(scheduleData.map(item => item.time))];
        times.sort();

        // If no data exists, we can still show some empty default rows (optional)
        if (times.length === 0) {
            times = ['09:00', '10:30', '11:00', '14:00'];
        }

        times.forEach(time => {
            const tr = document.createElement('tr');
            
            // Time Column
            const timeTd = document.createElement('td');
            timeTd.className = 'time-col';
            timeTd.textContent = time;
            tr.appendChild(timeTd);

            // Day Columns
            daysOfWeek.forEach(day => {
                const td = document.createElement('td');
                
                // Find if an event exists for this day and time
                const event = scheduleData.find(e => e.day === day && e.time === time);
                
                if (event) {
                    const eventDiv = document.createElement('div');
                    eventDiv.className = `event-card ${event.theme}`;
                    eventDiv.textContent = event.subject;
                    td.appendChild(eventDiv);
                }
                
                tr.appendChild(td);
            });

            tableBody.appendChild(tr);
        });
    }

    // Add new subject handler
    addBtn.addEventListener('click', () => {
        const subject = subjectInput.value.trim();
        const day = dayInput.value;
        const time = timeInput.value;

        if (!subject || !time) {
            alert('Please enter both a subject and a time.');
            return;
        }

        // Check for conflicts (optional feature, but prevents overlapping divs in our simple grid)
        const conflict = scheduleData.find(e => e.day === day && e.time === time);
        if (conflict) {
            alert('A subject is already scheduled at this time on this day.');
            return;
        }

        // Pick a random theme for the new subject
        const randomTheme = themes[Math.floor(Math.random() * themes.length)];

        scheduleData.push({
            subject,
            day,
            time,
            theme: randomTheme
        });

        // Clear inputs after adding
        subjectInput.value = '';
        timeInput.value = '';
        
        renderTable();
    });

    // Reset all handler
    resetBtn.addEventListener('click', () => {
        if(confirm('Are you sure you want to remove all subjects?')) {
            scheduleData = [];
            renderTable();
        }
    });

    // Initial render
    renderTable();
</script>

</body>
</html>
